name: CDN Deployment

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build:cdn

      - name: Deploy to CDN
        # This is a placeholder for actual CDN deployment (e.g., S3, Netlify, or custom script)
        # Usually involving secrets for access keys
        run: |
          echo "Deploying to CDN..."
          npm run deploy:cdn
        env:
          CDN_ACCESS_KEY: ${{ secrets.CDN_ACCESS_KEY }}
          CDN_SECRET_KEY: ${{ secrets.CDN_SECRET_KEY }}
